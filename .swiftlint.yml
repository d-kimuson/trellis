included:
  - Sources

excluded:
  - deps
  - .build

# Rules tuned for this project's style (functional, ADT-heavy)
disabled_rules:
  # Allow pattern matching with multiple lets
  - pattern_matching_keywords
  # Don't force documentation on everything in a small codebase
  - missing_docs

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - reduce_into
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - yoda_condition

# Project-specific tuning
line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y

# Custom rules for Trellis architecture enforcement
custom_rules:
  # Prevent regression to ObservableObject — project has unified on @Observable.
  no_observable_object:
    name: "Use @Observable instead of ObservableObject"
    regex: ':\s*ObservableObject\b'
    message: "This project uses @Observable (Swift 5.9+). Do not use ObservableObject."
    severity: error

  # Prevent Model layer from importing AppKit (GUI independence requirement).
  no_appkit_in_models:
    name: "Models must not import AppKit"
    regex: '^import AppKit'
    included: "Sources/Trellis/Models/(?!TerminalSession)"
    message: "Model files must not import AppKit. Keep models GUI-independent for cross-platform support."
    severity: warning
