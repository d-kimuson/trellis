included:
  - Sources

excluded:
  - deps
  - .build

# Rules tuned for this project's style (functional, ADT-heavy)
disabled_rules:
  # Allow pattern matching with multiple lets
  - pattern_matching_keywords
  # Don't force documentation on everything in a small codebase
  - missing_docs

opt_in_rules:
  - closure_spacing
  - contains_over_filter_count
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - reduce_into
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - yoda_condition

# Project-specific tuning
line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y
